# LLM RAGtools Global Configuration

# ============================================================
# MiniMax API Configuration (Core LLM Capabilities)
# ============================================================
minimax:
  api_key: "${MINIMAX_API_KEY}"      # Read from environment variable
  base_url: "https://api.minimaxi.com"
  model: "MiniMax-Text-01"            # Text model (entity extraction/classification/quality evaluation)
  vision_model: "MiniMax-Hailuo-VL-01" # Multimodal model (image understanding/chart description)
  embedding_model: "embo-01"          # Embedding model
  max_tokens: 8192
  timeout: 60

# ============================================================
# Claude Code CLI (Optional, for complex Agent tasks)
# ============================================================
claude_code:
  enabled: true
  model: "sonnet-4"                  # claude-sonnet-4 or opus-4
  timeout: 120

# ============================================================
# Gemini CLI (Optional, open-source CLI tool)
# ============================================================
gemini_cli:
  enabled: false
  model: "gemini-2.0-flash"
  api_key: "${GOOGLE_API_KEY}"       # Read from environment variable

# ============================================================
# Vector Database
# ============================================================
vector_store:
  type: "qdrant"                      # qdrant / milvus / chroma
  qdrant:
    url: "http://localhost:6333"
    collection: "rag_knowledge_base"
    vector_size: 1024                 # bge-large-zh-v1.5 dimension
    distance: "Cosine"
  milvus:
    host: "localhost"
    port: 19530
    collection: "rag_knowledge_base"

# ============================================================
# Knowledge Graph (Optional)
# ============================================================
knowledge_graph:
  enabled: false
  type: "neo4j"                      # neo4j / networkx
  neo4j:
    uri: "bolt://localhost:7687"
    username: "neo4j"
    password: "${NEO4J_PASSWORD}"

# ============================================================
# Embedding Model
# ============================================================
embedding:
  model_name: "BAAI/bge-large-zh-v1.5"  # Chinese-optimized Embedding model
  device: "cuda"                          # cuda / cpu
  batch_size: 32
  normalize: true

# ============================================================
# PDF Parser Configuration
# ============================================================
pdf_parser:
  extract_images: true                 # Extract images for multimodal understanding
  extract_tables: true                 # Table extraction
  ocr_threshold: 0.5                 # Text confidence threshold, trigger OCR below this
  min_text_length: 50                 # Minimum text block length
  merge_short_blocks: true             # Merge too-short text blocks

# ============================================================
# Chunking Configuration
# ============================================================
chunking:
  strategy: "semantic"               # fixed / recursive / semantic / domain
  chunk_size: 500                    # token count
  overlap: 50                        # overlapping token count
  min_chunk_size: 30                 # minimum chunk length (characters)
  respect_headings: true              # try to split at headings
  semantic:
    embedding_model: "BAAI/bge-large-zh-v1.5"
    threshold: 0.7                  # semantic similarity threshold

# ============================================================
# Entity Extraction Configuration
# ============================================================
ner:
  enabled: true
  use_llm: true                      # True = MiniMax API, False = rules + keywords
  schema: "technical"                # default / technical / legal / medical
  confidence_threshold: 0.6           # Confidence filter threshold

# ============================================================
# Classification Configuration
# ============================================================
classifier:
  cascade: true                       # Cascade classification (rules → Embedding → LLM)
  taxonomy:
    - Technical Documentation
    - Product Specification
    - Policy & Regulation
    - Research Report
    - Operation Manual
    - FAQ
  rule_confidence_threshold: 0.9    # Rule classification confidence threshold
  embedding_confidence_threshold: 0.7 # Embedding classification confidence threshold

# ============================================================
# Quality Scoring Configuration
# ============================================================
quality:
  enabled: true
  use_llm: true                      # LLM self-evaluation
  min_quality_score: 0.3             # Filter out chunks below this score

# ============================================================
# Deduplication Configuration
# ============================================================
dedup:
  enabled: true
  method: "hybrid"                   # minhash / embedding / hybrid
  minhash_threshold: 0.8            # MinHash literal similarity threshold
  embedding_threshold: 0.92          # Embedding semantic similarity threshold

# ============================================================
# Knowledge Base Paths
# ============================================================
knowledge_base:
  input_dir: "./input/"
  output_dir: "./output/"
  temp_dir: "./temp/"

# ============================================================
# Logging
# ============================================================
logging:
  level: "INFO"
  file: "./logs/ragtools.log"
