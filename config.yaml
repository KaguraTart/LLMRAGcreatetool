# LLM RAGtools Global Configuration

# ============================================================
# MiniMax API Configuration (Legacy Compatibility)
# ============================================================
minimax:
  api_key: "${MINIMAX_API_KEY}"
  base_url: "https://api.minimaxi.com"
  model: "MiniMax-Text-01"
  vision_model: "MiniMax-Hailuo-VL-01"
  embedding_model: "embo-01"
  max_tokens: 8192
  timeout: 60

# ============================================================
# Multi-Provider Runtime Configuration
# ============================================================
providers:
  active: "minimax"
  enabled: ["minimax"]
  fallback_chain: ["minimax"]
  load_balancer_pool: []

  minimax:
    enabled: true
    api_key: "${MINIMAX_API_KEY}"
    base_url: "https://api.minimaxi.com"
    model: "MiniMax-Text-01"
    vision_model: "MiniMax-Hailuo-VL-01"
    embedding_model: "embo-01"
    timeout: 60

  openai:
    enabled: false
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o"
    embedding_model: "text-embedding-3-large"
    timeout: 60
    api_version: ""

  anthropic:
    enabled: false
    api_key: "${ANTHROPIC_API_KEY}"
    model: "claude-3-5-sonnet-20241022"
    timeout: 60

  gemini:
    enabled: false
    api_key: "${GEMINI_API_KEY}"
    model: "gemini-1.5-pro"
    embedding_model: "models/text-embedding-004"
    timeout: 60

  ollama:
    enabled: false
    api_key: ""
    base_url: "http://localhost:11434"
    model: "llama3.1"
    embedding_model: "nomic-embed-text"
    timeout: 120

  zhipu:
    enabled: false
    api_key: "${ZHIPU_API_KEY}"
    model: "glm-4"
    embedding_model: "embedding-2"
    timeout: 60

  qwen:
    enabled: false
    api_key: "${QWEN_API_KEY}"
    model: "qwen-max"
    embedding_model: "text-embedding-v3"
    timeout: 60

# ============================================================
# Vector Database
# ============================================================
vector_store:
  type: "qdrant"
  qdrant:
    url: "http://localhost:6333"
    collection: "rag_knowledge_base"
    vector_size: 1024
    distance: "Cosine"

# ============================================================
# Knowledge Graph (Optional)
# ============================================================
knowledge_graph:
  enabled: false
  type: "neo4j"
  neo4j:
    uri: "bolt://localhost:7687"
    username: "neo4j"
    password: "${NEO4J_PASSWORD}"

# ============================================================
# Embedding Model
# ============================================================
embedding:
  model_name: "BAAI/bge-large-zh-v1.5"
  device: "cuda"
  batch_size: 32
  normalize: true

# ============================================================
# PDF Parser Configuration
# ============================================================
pdf_parser:
  extract_images: true
  extract_tables: true
  ocr_threshold: 0.5
  min_text_length: 50
  merge_short_blocks: true

# ============================================================
# Chunking Configuration
# ============================================================
chunking:
  strategy: "semantic"
  chunk_size: 500
  overlap: 50
  min_chunk_size: 30
  respect_headings: true
  semantic:
    embedding_model: "BAAI/bge-large-zh-v1.5"
    threshold: 0.7

# ============================================================
# Entity Extraction Configuration
# ============================================================
ner:
  enabled: true
  use_llm: true
  schema: "technical"
  confidence_threshold: 0.6

# ============================================================
# Classification Configuration
# ============================================================
classifier:
  cascade: true
  taxonomy:
    - Technical Documentation
    - Product Specification
    - Policy & Regulation
    - Research Report
    - Operation Manual
    - FAQ
  rule_confidence_threshold: 0.9
  embedding_confidence_threshold: 0.7

# ============================================================
# Quality Scoring Configuration (Chunk quality)
# ============================================================
quality:
  enabled: true
  use_llm: true
  min_quality_score: 0.3

# ============================================================
# QA Runtime Configuration (Query -> Retrieve -> Answer)
# ============================================================
qa:
  rewrite: true
  decompose: true
  hyde: true

  retrieval_mode: "vector"       # vector / bm25 / hybrid
  vector_weight: 0.7
  bm25_weight: 0.3
  bm25_k1: 1.5
  bm25_b: 0.75

  rerank_enabled: false
  rerank_top_n: 20
  colbert_rerank_enabled: false
  colbert_rerank_top_n: 20

  cot_enabled: true
  self_verify: true
  min_faithfulness: 0.6

  answer_quality_enabled: true
  answer_quality_use_llm: true
  min_answer_quality_score: 0.5
  block_low_quality_response: false

# ============================================================
# Deduplication Configuration
# ============================================================
dedup:
  enabled: true
  method: "hybrid"
  minhash_threshold: 0.8
  embedding_threshold: 0.92

# ============================================================
# Knowledge Base Paths
# ============================================================
knowledge_base:
  input_dir: "./input/"
  output_dir: "./output/"
  temp_dir: "./temp/"

# ============================================================
# Logging
# ============================================================
logging:
  level: "INFO"
  file: "./logs/ragtools.log"

# ============================================================
# Daemon Configuration (llmragd)
# ============================================================
daemon:
  host: "127.0.0.1"
  port: 7474
  workspace_dir: "~/.llmrag"       # base directory for workspaces and PID file
  default_vector_store: "chroma"   # chroma (default, no external service) or qdrant
